name: Live Profile Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"

jobs:
  live-profile-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Check public proof routes
        run: python3 scripts/smoke_public_routes.py

      - name: Check GitHub profile proof metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 scripts/audit_github_pins.py

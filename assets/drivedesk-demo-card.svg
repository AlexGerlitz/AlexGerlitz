<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">DriveDesk AI Operator Demo - Alex Gerlitz</title>
  <desc id="desc">Preview card for DriveDesk AI Operator: transcript to RAG to approval to CRM-safe handoff with backend-owned state, audit, retries, contracts, CI, and runbooks.</desc>
  <rect width="1200" height="630" fill="#f7f8fa"/>
  <rect x="56" y="56" width="1088" height="518" rx="8" fill="#ffffff" stroke="#d8e0e7" stroke-width="2"/>
  <rect x="88" y="92" width="10" height="446" rx="5" fill="#0f766e"/>
  <text x="126" y="132" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="760" fill="#0b4f4a" letter-spacing="0">

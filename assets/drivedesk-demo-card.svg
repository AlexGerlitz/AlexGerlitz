    <rect x="134" y="0" width="156" height="54" rx="8" fill="#eef4ff"/>
    <text x="158" y="36" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="760" fill="#1d4ed8">Approval</text>
    <rect x="308" y="0" width="184" height="54" rx="8" fill="#fff4e5"/>
